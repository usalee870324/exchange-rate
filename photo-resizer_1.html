<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 사이즈 조절</title>
<style>
  :root{
    --bg:#f5f3ee;
    --card:#ffffff;
    --ink:#23211c;
    --dim:#8a857a;
    --line:#e5e1d8;
    --accent:#2f6f5e;
    --accent2:#e8f0ed;
    --danger:#c25b4e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:640px;margin:0 auto;}
  header{margin-bottom:20px;}
  .eyebrow{font-size:11px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;}
  .sub{font-size:13px;color:var(--dim);margin-top:6px;line-height:1.6;}

  /* drop zone */
  .drop{
    border:2px dashed var(--line);
    border-radius:16px;
    background:var(--card);
    padding:36px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
    margin-bottom:18px;
  }
  .drop:hover, .drop.on{border-color:var(--accent);background:var(--accent2);}
  .drop .big{font-size:34px;margin-bottom:8px;}
  .drop p{font-size:14px;color:var(--dim);line-height:1.6;}
  .drop b{color:var(--accent);}
  #file{display:none;}

  /* settings */
  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    margin-bottom:18px;
  }
  .panel h2{font-size:13px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:14px;}
  .modes{display:flex;gap:8px;margin-bottom:14px;}
  .mode{
    flex:1;padding:10px;border:1px solid var(--line);border-radius:10px;
    background:transparent;font-family:inherit;font-size:13px;font-weight:600;
    color:var(--dim);cursor:pointer;transition:all .15s;
  }
  .mode.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .fields{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .field{flex:1;min-width:110px;}
  .field label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;font-weight:600;}
  .field input, .field select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);outline:none;
    font-variant-numeric:tabular-nums;
  }
  .field input:focus, .field select:focus{border-color:var(--accent);}
  .lock{
    display:flex;align-items:center;gap:8px;margin-top:12px;
    font-size:13px;color:var(--dim);cursor:pointer;user-select:none;
  }
  .lock input{accent-color:var(--accent);width:16px;height:16px;}
  .qrow{margin-top:14px;}
  .qrow label{font-size:11px;color:var(--dim);font-weight:600;}
  .qrow .qval{color:var(--accent);font-weight:700;}
  .qrow input[type=range]{width:100%;accent-color:var(--accent);margin-top:6px;}

  /* list */
  .item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
    display:flex;gap:12px;align-items:center;
    margin-bottom:10px;
  }
  .thumb{
    width:64px;height:64px;border-radius:10px;object-fit:cover;
    background:var(--bg);flex-shrink:0;
  }
  .meta{flex:1;min-width:0;}
  .meta .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .meta .dims{font-size:12px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums;}
  .meta .dims b{color:var(--accent);font-weight:700;}
  .dl{
    padding:9px 14px;border:none;border-radius:10px;
    background:var(--accent);color:#fff;font-family:inherit;font-size:13px;font-weight:700;
    cursor:pointer;flex-shrink:0;
  }
  .rm{
    padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;
    color:var(--danger);font-family:inherit;font-size:13px;cursor:pointer;flex-shrink:0;
  }

  .btn-all{
    width:100%;padding:15px;border:none;border-radius:12px;
    background:var(--ink);color:#fff;font-family:inherit;font-size:15px;font-weight:700;
    cursor:pointer;margin-top:6px;display:none;
  }
  .btn-all:active{transform:scale(.99);}
  footer{margin-top:26px;font-size:11px;color:var(--dim);text-align:center;line-height:1.8;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Image Resizer</div>
    <h1>사진 사이즈 조절</h1>
    <div class="sub">사진이 어디에도 업로드되지 않고 이 화면 안에서만 처리됩니다 — 안심하고 사용하세요.</div>
  </header>

  <div class="drop" id="drop">
    <div class="big">🖼️</div>
    <p><b>탭해서 사진 선택</b> 또는 여기로 드래그<br>여러 장 동시에 가능 (JPG · PNG · WebP)</p>
  </div>
  <input type="file" id="file" accept="image/*" multiple>

  <div class="panel">
    <h2>크기 설정</h2>
    <div class="modes">
      <button class="mode on" data-mode="px">픽셀 지정</button>
      <button class="mode" data-mode="pct">비율(%)</button>
      <button class="mode" data-mode="preset">용도별 추천</button>
    </div>

    <div class="fields" id="f-px">
      <div class="field">
        <label>가로 (px)</label>
        <input type="number" id="w" placeholder="예: 1200" inputmode="numeric">
      </div>
      <div class="field">
        <label>세로 (px)</label>
        <input type="number" id="h" placeholder="자동" inputmode="numeric">
      </div>
    </div>

    <div class="fields" id="f-pct" style="display:none">
      <div class="field">
        <label>축소 비율 (%)</label>
        <input type="number" id="pct" value="50" inputmode="numeric">
      </div>
    </div>

    <div class="fields" id="f-preset" style="display:none">
      <div class="field">
        <label>용도 선택</label>
        <select id="preset">
          <option value="1920">풀HD · 블로그 대표사진 (1920px)</option>
          <option value="1200">블로그 본문용 (1200px)</option>
          <option value="1080">인스타그램 정사각 기준 (1080px)</option>
          <option value="800">이메일 첨부용 (800px)</option>
          <option value="400">프로필/썸네일 (400px)</option>
        </select>
      </div>
    </div>

    <label class="lock" id="lockrow">
      <input type="checkbox" id="lock" checked>
      가로세로 비율 유지
    </label>

    <div class="qrow">
      <label>저장 형식 &nbsp;</label>
      <select id="fmt" style="padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;">
        <option value="jpeg">JPG (사진 추천, 용량 작음)</option>
        <option value="png">PNG (투명배경 유지)</option>
        <option value="webp">WebP (최신, 최소 용량)</option>
      </select>
    </div>

    <div class="qrow" id="qwrap">
      <label>화질 <span class="qval" id="qv">85%</span></label>
      <input type="range" id="q" min="30" max="100" value="85">
    </div>
  </div>

  <div id="list"></div>
  <button class="btn-all" id="dlall">⬇ 전체 다운로드</button>

  <footer>
    원본 파일은 변경되지 않으며, 조절된 사본이 다운로드됩니다<br>
    인터넷 연결 없이도 작동합니다
  </footer>
</div>

<script>
const $ = id => document.getElementById(id);
let items = []; // {file, img, name}

// mode switching
let mode = 'px';
document.querySelectorAll('.mode').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    mode = b.dataset.mode;
    $('f-px').style.display = mode==='px' ? 'flex' : 'none';
    $('f-pct').style.display = mode==='pct' ? 'flex' : 'none';
    $('f-preset').style.display = mode==='preset' ? 'flex' : 'none';
    $('lockrow').style.display = mode==='px' ? 'flex' : 'none';
    refreshAll();
  });
});

// quality slider
$('q').addEventListener('input', ()=>{ $('qv').textContent = $('q').value + '%'; });
$('fmt').addEventListener('change', ()=>{
  $('qwrap').style.display = $('fmt').value==='png' ? 'none' : 'block';
  refreshAll();
});
['w','h','pct','preset','q'].forEach(id=>{
  $(id).addEventListener('input', refreshAll);
  $(id).addEventListener('change', refreshAll);
});

// aspect lock: auto-fill the other box
$('w').addEventListener('input', ()=>{ if($('lock').checked) $('h').value=''; });
$('h').addEventListener('input', ()=>{ if($('lock').checked) $('w').value=''; });

// file input
$('drop').addEventListener('click', ()=>$('file').click());
$('file').addEventListener('change', e=>addFiles(e.target.files));
['dragover','dragenter'].forEach(ev=>$('drop').addEventListener(ev, e=>{e.preventDefault();$('drop').classList.add('on');}));
['dragleave','drop'].forEach(ev=>$('drop').addEventListener(ev, e=>{e.preventDefault();$('drop').classList.remove('on');}));
$('drop').addEventListener('drop', e=>addFiles(e.dataTransfer.files));

function addFiles(files){
  [...files].forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    const img = new Image();
    img.onload = ()=>{ items.push({file:f, img, name:f.name}); renderList(); };
    img.src = URL.createObjectURL(f);
  });
  $('file').value = '';
}

function targetSize(iw, ih){
  if(mode==='px'){
    let w = parseInt($('w').value), h = parseInt($('h').value);
    const lock = $('lock').checked;
    if(!w && !h) return null;
    if(lock){
      if(w && !h) h = Math.round(ih * w / iw);
      else if(h && !w) w = Math.round(iw * h / ih);
      else if(w && h){ // fit inside box keeping ratio
        const r = Math.min(w/iw, h/ih);
        w = Math.round(iw*r); h = Math.round(ih*r);
      }
    }else{
      if(!w) w = iw;
      if(!h) h = ih;
    }
    return {w, h};
  }
  if(mode==='pct'){
    const p = parseFloat($('pct').value);
    if(!p || p<=0) return null;
    return {w: Math.round(iw*p/100), h: Math.round(ih*p/100)};
  }
  // preset: longest side
  const t = parseInt($('preset').value);
  if(Math.max(iw,ih) <= t) return {w:iw, h:ih};
  const r = t / Math.max(iw,ih);
  return {w: Math.round(iw*r), h: Math.round(ih*r)};
}

function fmtBytes(b){
  if(b > 1024*1024) return (b/1024/1024).toFixed(1)+' MB';
  return Math.round(b/1024)+' KB';
}

function renderList(){
  const list = $('list');
  list.innerHTML = '';
  items.forEach((it, i)=>{
    const t = targetSize(it.img.naturalWidth, it.img.naturalHeight);
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <img class="thumb" src="${it.img.src}">
      <div class="meta">
        <div class="name">${it.name}</div>
        <div class="dims">
          ${it.img.naturalWidth}×${it.img.naturalHeight} (${fmtBytes(it.file.size)})
          ${t ? ` → <b>${t.w}×${t.h}</b>` : ''}
        </div>
      </div>
      <button class="dl" data-i="${i}">저장</button>
      <button class="rm" data-i="${i}">✕</button>
    `;
    list.appendChild(div);
  });
  list.querySelectorAll('.dl').forEach(b=>b.addEventListener('click', ()=>download(items[b.dataset.i])));
  list.querySelectorAll('.rm').forEach(b=>b.addEventListener('click', ()=>{items.splice(b.dataset.i,1); renderList();}));
  $('dlall').style.display = items.length>1 ? 'block' : 'none';
}
function refreshAll(){ renderList(); }

function download(it){
  const t = targetSize(it.img.naturalWidth, it.img.naturalHeight);
  if(!t){ alert('먼저 크기를 입력해 주세요 (가로 또는 세로, 비율, 용도 중 하나)'); return; }
  const canvas = document.createElement('canvas');
  canvas.width = t.w; canvas.height = t.h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(it.img, 0, 0, t.w, t.h);
  const fmt = $('fmt').value;
  const mime = 'image/'+fmt;
  const q = parseInt($('q').value)/100;
  canvas.toBlob(blob=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const base = it.name.replace(/\.[^.]+$/, '');
    const ext = fmt==='jpeg' ? 'jpg' : fmt;
    a.download = `${base}_${t.w}x${t.h}.${ext}`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, mime, fmt==='png' ? undefined : q);
}

$('dlall').addEventListener('click', async ()=>{
  for(const it of items){
    download(it);
    await new Promise(r=>setTimeout(r, 400)); // 브라우저 다운로드 차단 방지 간격
  }
});
</script>
</body>
</html>
